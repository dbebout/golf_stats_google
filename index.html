<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Stat Tracker</title>
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-surface: #1e293b;
        --bg-input: #334155;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent-green: #22c55e;
        --accent-red: #ef4444;
        --border-radius: 12px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-main);
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      main {
        width: 100%;
        max-width: 480px;
      }

      header {
        margin-bottom: 24px;
        text-align: center;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
      }

      /* --- STATS CARD FLEXBOX --- */
      .stats-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 24px;
      }

      .stat-card {
        background-color: var(--bg-surface);
        border-radius: var(--border-radius);
        padding: 16px;
        flex: 1 1 calc(50% - 6px); /* Two cards per row */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }

      .stat-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--accent-green);
      }

      /* --- POST-HOLE INPUT FORM --- */
      .entry-form {
        background-color: var(--bg-surface);
        border-radius: var(--border-radius);
        padding: 20px;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
      }

      .form-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--bg-input);
        padding-bottom: 12px;
      }

      .hole-selector {
        font-size: 1.25rem;
        font-weight: 700;
      }

      .par-indicator {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      /* --- COUNTER BUTTONS --- */
      .counter-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: var(--bg-input);
        border-radius: var(--border-radius);
        padding: 6px;
      }

      .counter-btn {
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 1.5rem;
        width: 44px;
        height: 44px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: background 0.2s;
      }

      .counter-btn:active {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .counter-value {
        font-size: 1.5rem;
        font-weight: 700;
      }

      /* --- SEGMENTED TEE ACCURACY CONTROL --- */
      .segmented-control {
        display: flex;
        background-color: var(--bg-input);
        border-radius: var(--border-radius);
        padding: 4px;
        gap: 4px;
      }

      .segmented-control input[type="radio"] {
        display: none;
      }

      .segmented-control label {
        flex: 1;
        text-align: center;
        padding: 12px;
        margin: 0;
        cursor: pointer;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-main);
        transition:
          background 0.2s,
          color 0.2s;
      }

      .segmented-control input[type="radio"]:checked + label {
        background-color: var(--accent-green);
        color: var(--bg-primary);
      }

      /* --- ACTION BUTTONS --- */
      .submit-btn {
        width: 100%;
        background-color: var(--accent-green);
        color: var(--bg-primary);
        border: none;
        border-radius: var(--border-radius);
        padding: 16px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 6px -1px rgba(34, 197, 94, 0.2);
        transition: transform 0.1s;
      }

      .submit-btn:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Round Dashboard</h1>
      </header>

      <!-- Dynamic Live Stats Grid -->
      <section class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Score</span>
          <span class="stat-value">+3</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Fairways</span>
          <span class="stat-value">62%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">GIR</span>
          <span class="stat-value">55%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Avg Putts</span>
          <span class="stat-value">1.8</span>
        </div>
      </section>

      <!-- 18Birdies/TheGrint Inspired Post-Hole Form -->
      <form class="entry-form" onsubmit="event.preventDefault()">
        <div class="form-header">
          <span class="hole-selector">Hole 7</span>
          <span class="par-indicator">Par 4 &bull; 385 Yds</span>
        </div>

        <!-- Total Strokes Counter -->
        <div class="form-group">
          <label>Total Score</label>
          <div class="counter-container">
            <button type="button" class="counter-btn">&minus;</button>
            <span class="counter-value">4</span>
            <button type="button" class="counter-btn">&plus;</button>
          </div>
        </div>

        <!-- Putts Counter -->
        <div class="form-group">
          <label>Total Putts</label>
          <div class="counter-container">
            <button type="button" class="counter-btn">&minus;</button>
            <span class="counter-value">2</span>
            <button type="button" class="counter-btn">&plus;</button>
          </div>
        </div>

        <!-- Fairway Segmented Control -->
        <div class="form-group">
          <label>Fairway Accuracy</label>
          <div class="segmented-control">
            <input type="radio" id="miss-left" name="fairway" value="left" />
            <label for="miss-left">Left</label>

            <input
              type="radio"
              id="hit-hit"
              name="fairway"
              value="hit"
              checked
            />
            <label for="hit-hit">Hit</label>

            <input type="radio" id="miss-right" name="fairway" value="right" />
            <label for="miss-right">Right</label>
          </div>
        </div>

        <button type="submit" class="submit-btn">Save Hole Stats</button>
      </form>
    </main>
  </body>
</html>
